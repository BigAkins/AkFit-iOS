name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-sanity:
    name: iOS build/test sanity
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Print Xcode and simulator diagnostics
        run: |
          xcodebuild -version
          echo
          xcodebuild -list -project AkFit/AkFit.xcodeproj
          echo
          xcrun simctl list devices available
          echo
          xcodebuild -showdestinations -project AkFit/AkFit.xcodeproj -scheme AkFit

      - name: Select simulator destination
        id: simulator
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import subprocess
          import sys

          output = subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "-j"],
              text=True,
          )
          devices = json.loads(output).get("devices", {})

          candidates = []
          for runtime, entries in devices.items():
              if "iOS" not in runtime:
                  continue

              try:
                  version = tuple(int(part) for part in runtime.rsplit("iOS-", 1)[1].split("-"))
              except (IndexError, ValueError):
                  version = (0,)

              for device in entries:
                  name = device.get("name", "")
                  udid = device.get("udid")
                  if not udid or not name.startswith("iPhone"):
                      continue
                  candidates.append((version, name, udid, runtime))

          if not candidates:
              sys.exit("No available iPhone simulator was found on the runner.")

          candidates.sort(reverse=True)
          version, name, udid, runtime = candidates[0]

          print(f"udid={udid}")
          print(f"name={name}")
          print(f"runtime={runtime}")
          PY

      - name: Boot simulator
        shell: bash
        run: |
          set -euo pipefail
          xcrun simctl boot "${{ steps.simulator.outputs.udid }}" || true
          xcrun simctl bootstatus "${{ steps.simulator.outputs.udid }}" -b
          xcrun simctl list devices "${{ steps.simulator.outputs.udid }}"

      - name: Run Xcode sanity pass
        shell: bash
        run: |
          set -euo pipefail

          log_path=/tmp/akfit-ios-sanity.log

          if ! xcodebuild test \
            -project AkFit/AkFit.xcodeproj \
            -scheme AkFit \
            -destination "id=${{ steps.simulator.outputs.udid }}" \
            -parallel-testing-enabled NO \
            -derivedDataPath /tmp/AkFitDerivedData \
            -clonedSourcePackagesDirPath /tmp/AkFitSourcePackages \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee "$log_path"; then
            echo
            echo "xcodebuild failed for simulator ${{ steps.simulator.outputs.name }} (${{ steps.simulator.outputs.runtime }})"
            echo "Last 200 lines of $log_path:"
            tail -n 200 "$log_path"
            exit 1
          fi

  supabase-integrity:
    name: Supabase migration and RLS integrity
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51
        with:
          version: 2.90.0

      - name: Start local database services
        run: supabase db start

      - name: Rebuild database from migrations and seeds
        run: supabase db reset --local --yes

      - name: Lint resulting schema
        run: supabase db lint

      - name: Run database regression checks
        run: supabase test db
